<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8857a"/>
      <stop offset="100%" stop-color="#d46a5e"/>
    </linearGradient>
    <linearGradient id="cookie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d4a8"/>
      <stop offset="100%" stop-color="#e8c48a"/>
    </linearGradient>
  </defs>

  <!-- Cookie icon -->
  <circle cx="80" cy="100" r="55" fill="url(#cookie)" stroke="#d4a853" stroke-width="2"/>
  <!-- Chocolate chips -->
  <circle cx="65" cy="85" r="5" fill="#5c3a1e"/>
  <circle cx="95" cy="90" r="4" fill="#5c3a1e"/>
  <circle cx="78" cy="108" r="4.5" fill="#5c3a1e"/>
  <circle cx="60" cy="110" r="3.5" fill="#5c3a1e"/>
  <circle cx="100" cy="108" r="3.5" fill="#5c3a1e"/>
  <circle cx="85" cy="78" r="3" fill="#5c3a1e"/>

  <!-- Decorative icing -->
  <path d="M58 95 Q62 88 68 92 Q72 85 78 90" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88 100 Q92 93 98 97" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Brand text -->
  <text x="155" y="100" font-family="'Georgia','Times New Roman',serif" font-size="58" font-weight="bold" fill="#2d2a24" letter-spacing="1">Glassitas</text>
  <text x="160" y="130" font-family="'Georgia','Times New Roman',serif" font-size="14" fill="#8a7e6b" letter-spacing="3">GALLETAS DECORADAS</text>
</svg>
